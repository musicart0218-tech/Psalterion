<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legends of Astra - Playable Alpha</title>
    <style>
        body {
            margin: 0;
            background-color: #0b0c10;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
        }
        #game-container {
            border: 4px solid #1f2833;
            box-shadow: 0px 0px 20px #45f3ff33;
        }
    </style>
</head>
<body>
    <div id="auth-gateway" style="width: 360px; background: #161b22; border: 2px solid #1f2833; padding: 25px; border-radius: 8px; color: white; box-shadow: 0 0 15px rgba(0,0,0,0.5); margin: auto;">
        <h2 style="margin: 0 0 20px 0; color: #45f3ff; text-align: center;">Legends of Astra</h2>
        
        <div id="login-form">
            <input type="text" id="login-user" placeholder="Username" style="width: 93%; padding: 10px; margin-bottom: 12px; background: #0d0e12; border: 1px solid #30363d; color: white; border-radius: 4px;"/>
            <input type="password" id="login-pass" placeholder="Password" style="width: 93%; padding: 10px; margin-bottom: 15px; background: #0d0e12; border: 1px solid #30363d; color: white; border-radius: 4px;"/>
            <button id="btn-login" style="width: 100%; padding: 12px; background: #238636; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 4px; margin-bottom: 15px;">Enter Game</button>
            <p style="text-align: center; font-size: 13px; color: #8b949e; margin: 0;">New Hero? <a href="#" id="go-register" style="color: #58a6ff; text-decoration: none;">Create an Account</a></p>
        </div>

        <div id="register-form" style="display: none;">
            <input type="text" id="reg-user" placeholder="Username" style="width: 93%; padding: 10px; margin-bottom: 10px; background: #0d0e12; border: 1px solid #30363d; color: white; border-radius: 4px;"/>
            <input type="email" id="reg-email" placeholder="Email Address" style="width: 93%; padding: 10px; margin-bottom: 10px; background: #0d0e12; border: 1px solid #30363d; color: white; border-radius: 4px;"/>
            <input type="password" id="reg-pass" placeholder="Password" style="width: 93%; padding: 10px; margin-bottom: 10px; background: #0d0e12; border: 1px solid #30363d; color: white; border-radius: 4px;"/>
            <input type="text" id="reg-char" placeholder="Character Name" style="width: 93%; padding: 10px; margin-bottom: 10px; background: #0d0e12; border: 1px solid #30363d; color: white; border-radius: 4px;"/>
            <select id="reg-class" style="width: 100%; padding: 10px; margin-bottom: 15px; background: #0d0e12; border: 1px solid #30363d; color: white; border-radius: 4px;">
                <option value="GUARDIAN">Guardian (Melee Tank)</option>
                <option value="ARCANIST">Arcanist (Mage DPS)</option>
                <option value="SHADOWBLADE">Shadowblade (Assassin)</option>
                <option value="RANGER">Ranger (Ranged)</option>
            </select>
            <button id="btn-register" style="width: 100%; padding: 12px; background: #1f6feb; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 4px; margin-bottom: 15px;">Forge Character</button>
            <p style="text-align: center; font-size: 13px; color: #8b949e; margin: 0;">Already registered? <a href="#" id="go-login" style="color: #58a6ff; text-decoration: none;">Log In</a></p>
        </div>
    </div>

    <div id="game-container" style="display: none;"></div>
    <script type="module" src="/src/index.ts"></script>
</body>
</html>
